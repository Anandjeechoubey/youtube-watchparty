<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="scene" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A211A"/><stop offset="0.6" stop-color="#3C2C20"/><stop offset="1" stop-color="#21130c"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B98A60"/><stop offset="0.55" stop-color="#7B5638"/><stop offset="1" stop-color="#4A3324"/>
    </linearGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7EEE2"/><stop offset="1" stop-color="#E7D3BB"/>
    </linearGradient>
    <linearGradient id="vid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a3028"/><stop offset="1" stop-color="#241c16"/>
    </linearGradient>
    <symbol id="paw" viewBox="0 0 128 128">
      <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
      <g fill="url(#pad)"><circle cx="37" cy="52" r="9"/><circle cx="53.5" cy="40" r="9.5"/><circle cx="74.5" cy="40" r="9.5"/><circle cx="91" cy="52" r="9"/></g>
      <path d="M64 57 C 85 57, 97 71, 97 85 C 97 100, 83 108, 64 108 C 45 108, 31 100, 31 85 C 31 71, 43 57, 64 57 Z" fill="url(#pad)"/>
      <path d="M57 73 L57 99 L82 86 Z" fill="#5A3A26" stroke="#5A3A26" stroke-width="4" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <rect width="1280" height="800" fill="url(#scene)"/>

  <!-- caption -->
  <text x="640" y="78" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="800" fill="#F7EEE2">Everyone stays perfectly in sync</text>
  <text x="640" y="116" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#D9C4AC">Play, pause, seek, or change speed — it syncs for the whole party, instantly.</text>

  <!-- browser card -->
  <rect x="96" y="150" width="1088" height="600" rx="18" fill="#161310" stroke="#3f352c" stroke-width="1.5"/>
  <rect x="96" y="150" width="1088" height="46" rx="18" fill="#241d17"/>
  <circle cx="124" cy="173" r="6" fill="#9c6b48"/><circle cx="146" cy="173" r="6" fill="#c0a06f"/><circle cx="168" cy="173" r="6" fill="#7e9b6a"/>
  <rect x="210" y="161" width="420" height="24" rx="12" fill="#161310"/>
  <text x="230" y="178" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#b3a594">youtube.com/watch?v=…</text>

  <!-- video area -->
  <rect x="128" y="216" width="700" height="394" rx="10" fill="url(#vid)"/>
  <circle cx="478" cy="404" r="48" fill="#000000" opacity="0.35"/>
  <path d="M462 380 L462 428 L506 404 Z" fill="#F7EEE2"/>
  <!-- progress bar -->
  <rect x="150" y="566" width="656" height="6" rx="3" fill="#5a4a3c"/>
  <rect x="150" y="566" width="250" height="6" rx="3" fill="#C99A6E"/>
  <circle cx="400" cy="569" r="8" fill="#E7D3BB"/>
  <text x="150" y="596" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#cdbba6">12:34 / 45:08</text>
  <rect x="742" y="582" width="62" height="24" rx="12" fill="#ffffff" fill-opacity="0.1"/>
  <text x="773" y="599" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#EADBC8">1.5×</text>

  <!-- PAWP overlay panel -->
  <g>
    <rect x="852" y="216" width="300" height="394" rx="14" fill="#221c17" stroke="#3f352c" stroke-width="1.5"/>
    <!-- header -->
    <rect x="852" y="216" width="300" height="44" rx="14" fill="#2d2620"/>
    <use href="#paw" x="864" y="226" width="22" height="22"/>
    <text x="894" y="243" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#F3ECE2">PAWP connect</text>
    <text x="1138" y="243" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#8bb673">connected · host</text>

    <!-- participants -->
    <text x="868" y="284" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="0.5" fill="#b3a594">IN THE PARTY (3)</text>
    <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#f3ece2">
      <text x="868" y="310">Anand (you)</text>
      <rect x="952" y="299" width="34" height="16" rx="8" fill="#a9744f"/><text x="969" y="311" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">HOST</text>
      <text x="868" y="334">Riya</text>
      <text x="868" y="358">Sam</text>
    </g>
    <line x1="868" y1="374" x2="1136" y2="374" stroke="#382f27" stroke-width="1"/>

    <!-- chat -->
    <text x="868" y="398" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="0.5" fill="#b3a594">CHAT</text>
    <g font-family="Helvetica, Arial, sans-serif" font-size="13.5">
      <text x="868" y="424" fill="#f3ece2"><tspan fill="#d8a878" font-weight="700">Riya:&#160;</tspan>omg this part</text>
      <text x="868" y="448" fill="#f3ece2"><tspan fill="#8bb673" font-weight="700">you:&#160;</tspan>i know right</text>
      <text x="868" y="472" fill="#f3ece2"><tspan fill="#d8a878" font-weight="700">Sam:&#160;</tspan>wait, pause!</text>
      <text x="868" y="496" font-style="italic" fill="#b3a594">Sam paused · 12:34</text>
    </g>

    <!-- emoji bar -->
    <g>
      <circle cx="876" cy="526" r="11" fill="#e0b15e"/><circle cx="902" cy="526" r="11" fill="#d98a6b"/>
      <circle cx="928" cy="526" r="11" fill="#c98f5f"/><circle cx="954" cy="526" r="11" fill="#8bb673"/>
      <circle cx="980" cy="526" r="11" fill="#cf7e62"/><circle cx="1006" cy="526" r="11" fill="#c0a06f"/>
    </g>
    <!-- input -->
    <rect x="868" y="552" width="210" height="38" rx="9" fill="#1a1511" stroke="#3f352c"/>
    <text x="882" y="576" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#8a7d6c">Say something…</text>
    <rect x="1086" y="552" width="50" height="38" rx="9" fill="#a9744f"/>
    <text x="1111" y="576" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#fff">Send</text>
  </g>
</svg>
